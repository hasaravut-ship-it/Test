<!DOCTYPE html>
<html>
<head>
  <title>Protected Page</title>

  <script>
    if (localStorage.getItem("auth") !== "true") {
      window.location.href = "login.html";
    }
  </script>
</head>
<body>
  <h1>Welcome 🎉</h1>

  <button onclick="logout()">Logout</button>

  <script>
    function logout() {
      localStorage.removeItem("auth");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
